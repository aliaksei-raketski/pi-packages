name: Publish npm packages

on:
  workflow_dispatch:
    inputs:
      ref:
        description: Git ref or SHA to publish. Defaults to the selected workflow ref for manual runs.
        required: false
        type: string
      paths_released:
        description: JSON array of package directories to publish. Defaults to all unpublished packages for manual runs.
        required: false
        default: "[]"
        type: string

permissions:
  contents: read
  id-token: write

jobs:
  publish:
    name: Publish npm packages
    runs-on: ubuntu-24.04

    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          ref: ${{ inputs.ref || github.ref }}

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Verify packages
        run: npm run check

      - name: Publish packages
        env:
          NPM_CONFIG_PROVENANCE: "true"
          PATHS_RELEASED: ${{ inputs.paths_released }}
        run: |
          set -euo pipefail

          release_paths=()
          if [ -n "${PATHS_RELEASED:-}" ] && [ "${PATHS_RELEASED}" != "[]" ]; then
            mapfile -t release_paths < <(
              node -e '
                const paths = JSON.parse(process.env.PATHS_RELEASED || "[]");
                for (const path of paths) {
                  if (path && path !== ".") console.log(path);
                }
              '
            )
          else
            for package_json in packages/*/package.json; do
              release_paths+=("$(dirname "$package_json")")
            done
          fi

          if [ "${#release_paths[@]}" -eq 0 ]; then
            echo "No package paths selected for publishing."
            exit 0
          fi

          for package_dir in "${release_paths[@]}"; do
            package_json="${package_dir}/package.json"

            if [ ! -f "$package_json" ]; then
              echo "Skipping ${package_dir}; package.json not found."
              continue
            fi

            package_name="$(node -p "require('./${package_json}').name")"
            package_version="$(node -p "require('./${package_json}').version")"
            package_private="$(node -p "Boolean(require('./${package_json}').private)")"

            if [ "$package_private" = "true" ]; then
              echo "Skipping private package ${package_name}."
              continue
            fi

            if npm view "${package_name}@${package_version}" version --registry=https://registry.npmjs.org >/dev/null 2>&1; then
              echo "${package_name}@${package_version} is already published; skipping."
              continue
            fi

            echo "Publishing ${package_name}@${package_version} from ${package_dir}..."
            npm publish "./${package_dir}" --access public
          done
