name: Publish npm packages

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - packages/**
      - package.json
      - package-lock.json
      - tsconfig.json
      - biome.json
      - .github/workflows/publish-npm.yml

permissions:
  contents: read
  id-token: write

jobs:
  publish:
    name: Publish unpublished workspace packages
    runs-on: ubuntu-24.04

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Verify packages
        run: npm run check

      - name: Publish unpublished packages
        env:
          NPM_CONFIG_PROVENANCE: "true"
        run: |
          set -euo pipefail

          for package_json in packages/*/package.json; do
            package_dir="$(dirname "$package_json")"
            package_name="$(node -p "require('./${package_json}').name")"
            package_version="$(node -p "require('./${package_json}').version")"
            package_private="$(node -p "Boolean(require('./${package_json}').private)")"

            if [ "$package_private" = "true" ]; then
              echo "Skipping private package ${package_name}."
              continue
            fi

            if npm view "${package_name}@${package_version}" version --registry=https://registry.npmjs.org >/dev/null 2>&1; then
              echo "${package_name}@${package_version} is already published; skipping."
              continue
            fi

            echo "Publishing ${package_name}@${package_version} from ${package_dir}..."
            npm publish "./${package_dir}" --access public
          done
