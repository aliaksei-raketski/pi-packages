name: release-please

on:
  workflow_run:
    workflows:
      - CI
    types:
      - completed

jobs:
  release-please:
    name: release-please
    if: github.event.workflow_run.conclusion == 'success' && github.event.workflow_run.head_branch == 'main'
    runs-on: ubuntu-24.04
    permissions:
      actions: write
      contents: write
      pull-requests: write

    steps:
      - name: Generate release pull requests and releases
        id: release
        uses: googleapis/release-please-action@v4
        with:
          token: ${{ secrets.RELEASE_PLEASE_TOKEN }}
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json

      - name: Trigger npm publish workflow
        if: steps.release.outputs.releases_created == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_SHA: ${{ github.event.workflow_run.head_sha }}
          PATHS_RELEASED: ${{ steps.release.outputs.paths_released }}
        run: |
          set -euo pipefail

          payload_file="${RUNNER_TEMP}/publish-dispatch.json"
          PAYLOAD_FILE="$payload_file" node <<'NODE'
          const fs = require("node:fs");

          const payload = {
            ref: "main",
            inputs: {
              ref: process.env.RELEASE_SHA,
              paths_released: process.env.PATHS_RELEASED || "[]",
            },
          };

          fs.writeFileSync(process.env.PAYLOAD_FILE, JSON.stringify(payload));
          NODE

          gh api \
            --method POST \
            -H "Accept: application/vnd.github+json" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            "repos/${GITHUB_REPOSITORY}/actions/workflows/publish-npm.yml/dispatches" \
            --input "$payload_file"
